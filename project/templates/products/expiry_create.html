
{% extends 'base.html' %}
{% load humanize %}

{% block title %}إضافة مراقبة صلاحية{% endblock %}
{% block page_title %}إضافة مراقبة صلاحية جديدة{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header">
    <span class="card-title">إضافة مراقبة صلاحية</span>
  </div>
  <div class="card-body">
    <form method="post">
      {% csrf_token %}
      
      <div class="form-group">
        <label class="form-label">المنتج *</label>
        <select name="product" class="form-select" required>
          <option value="">-- اختر منتج --</option>
          {% for product in products %}
          <option value="{{ product.id }}">{{ product.name }} - {{ product.barcode|default:'بدون باركود' }}</option>
          {% endfor %}
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">الفرع *</label>
        <select name="branch" class="form-select" required>
          <option value="">-- اختر فرع --</option>
          {% for branch in branches %}
          <option value="{{ branch.id }}" {% if selected_branch == branch.id|stringformat:'s' %}selected{% endif %}>{{ branch.name }}</option>
          {% endfor %}
        </select>
      </div>
      
      <div class="form-group">
        <label class="form-label">الكمية المراقبة *</label>
        <input type="number" name="quantity" class="form-control" min="1" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">تاريخ انتهاء الصلاحية *</label>
        <input type="date" name="expiry_date" class="form-control" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">رقم الدفعة</label>
        <input type="text" name="batch_number" class="form-control" placeholder="اختياري">
      </div>
      
      <div class="form-group">
        <label class="form-label">ملاحظات</label>
        <textarea name="notes" class="form-control" rows="3"></textarea>
      </div>
      
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{% url 'product_expiry_list' %}" class="btn btn-outline">إلغاء</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
